<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <title>TP-spelet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body class="bg-dark text-white">

  <div class="container text-center mt-5">
    <h1 class="mb-4">Diamantjakten 💎</h1>
    <p>Välj kategori:</p>

    <div class="d-flex justify-content-center flex-wrap gap-3 mt-4">
      <!-- Matte är aktiv -->
      <button class="btn btn-secondary btn-lg category-btn" onclick="selectCategory('math', this)">Matte</button>
      <button class="btn btn-secondary btn-lg category-btn" onclick="selectCategory('english', this)">Engelska</button>
      <button class="btn btn-secondary btn-lg" disabled>Historia</button>
      <button class="btn btn-secondary btn-lg" disabled>Biologi</button>
      <button class="btn btn-secondary btn-lg" disabled>Vetenskap</button>
    </div>

    <!-- Nivåval, dold tills kategori väljs -->
    <div id="levelSelect" class="d-flex justify-content-center flex-wrap gap-3 mt-4" style="display:none;">
      <p class="w-100">Välj nivå:</p>
      <a id="level1" class="btn btn-outline-primary btn-lg" href="#">Lätt</a>
      <a id="level2" class="btn btn-outline-warning btn-lg" href="#">Medel</a>
      <a id="level3" class="btn btn-outline-danger btn-lg" href="#">Svår</a>
    </div>
  </div>

  <script>

let selectedCategory = null;

function selectCategory(cat, btnElement) {
  selectedCategory = cat;

  // show level panel
  const levelDiv = document.getElementById('levelSelect');
  levelDiv.style.display = 'flex';

  // reset ONLY category buttons
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.classList.remove('btn-primary', 'active');
    btn.classList.add('btn-secondary');
  });

  // activate selected category
  if (btnElement) {
    btnElement.classList.remove('btn-secondary');
    btnElement.classList.add('btn-primary', 'active');
  }

  // fetch available levels dynamically from JSON
  fetch('questions.json')
    .then(res => res.json())
    .then(data => {
      const categoryData = data[cat];

      // extract available levels
      const availableLevels = [
        ...new Set(categoryData.map(item => item.level))
      ];

      // configure level buttons
      for (let lvl = 1; lvl <= 3; lvl++) {
        const lvlBtn = document.getElementById('level' + lvl);

        if (availableLevels.includes(lvl)) {
          lvlBtn.style.display = "inline-block";
          lvlBtn.href = `card.html?category=${cat}&level=${lvl}`;
          lvlBtn.classList.remove("disabled");
        } else {
          lvlBtn.style.display = "none";
        }
      }
    });
}
  </script>

</body>

</html>
